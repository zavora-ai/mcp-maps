<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a4a"/>
      <stop offset="100%" stop-color="#1f1f3a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="18" font-weight="bold">mcp-maps — Architecture</text>

  <!-- Agent -->
  <rect x="30" y="60" width="150" height="70" fill="url(#card)" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="105" y="88" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="bold">AI Agent</text>
  <text x="105" y="108" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">Claude / Kiro / GPT</text>
  <text x="105" y="120" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">Any MCP Client</text>

  <!-- Arrow -->
  <line x1="180" y1="95" x2="250" y2="95" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="87" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="8">stdio</text>

  <!-- MCP Server -->
  <rect x="260" y="50" width="300" height="90" fill="url(#card)" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="410" y="75" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="13" font-weight="bold">mcp-maps</text>
  <text x="410" y="93" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Tool Router (7 tools)</text>

  <!-- Tool pills -->
  <rect x="275" y="105" width="65" height="18" fill="#3730a3" rx="4"/>
  <text x="307" y="117" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="7">geocode</text>
  <rect x="345" y="105" width="65" height="18" fill="#3730a3" rx="4"/>
  <text x="377" y="117" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="7">get_route</text>
  <rect x="415" y="105" width="65" height="18" fill="#3730a3" rx="4"/>
  <text x="447" y="117" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="7">elevation</text>
  <rect x="485" y="105" width="60" height="18" fill="#3730a3" rx="4"/>
  <text x="515" y="117" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="7">POI</text>

  <!-- Arrows to backends -->
  <line x1="330" y1="140" x2="180" y2="210" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="140" x2="410" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="140" x2="640" y2="210" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Nominatim -->
  <rect x="50" y="220" width="250" height="100" fill="url(#card)" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="175" y="245" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="bold">Nominatim (OpenStreetMap)</text>
  <text x="175" y="265" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">nominatim.openstreetmap.org</text>
  <rect x="65" y="278" width="70" height="16" fill="#064e3b" rx="3"/>
  <text x="100" y="289" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="7">Geocode</text>
  <rect x="140" y="278" width="70" height="16" fill="#064e3b" rx="3"/>
  <text x="175" y="289" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="7">Reverse</text>
  <rect x="215" y="278" width="70" height="16" fill="#064e3b" rx="3"/>
  <text x="250" y="289" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="7">Timezone</text>
  <text x="175" y="310" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="9">🌍 Global coverage • Free • 1 req/sec</text>

  <!-- OSRM -->
  <rect x="320" y="220" width="200" height="100" fill="url(#card)" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="420" y="245" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="bold">OSRM</text>
  <text x="420" y="265" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">router.project-osrm.org</text>
  <rect x="335" y="278" width="75" height="16" fill="#78350f" rx="3"/>
  <text x="372" y="289" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="7">Routing</text>
  <rect x="415" y="278" width="90" height="16" fill="#78350f" rx="3"/>
  <text x="460" y="289" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="7">Distance Matrix</text>
  <text x="420" y="310" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="9">🚗 🚶 🚴 • Turn-by-turn • Free</text>

  <!-- OpenTopoData -->
  <rect x="540" y="220" width="200" height="100" fill="url(#card)" stroke="#06b6d4" stroke-width="2" rx="8"/>
  <text x="640" y="245" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="bold">OpenTopoData</text>
  <text x="640" y="265" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">api.opentopodata.org</text>
  <rect x="575" y="278" width="60" height="16" fill="#164e63" rx="3"/>
  <text x="605" y="289" text-anchor="middle" fill="#67e8f9" font-family="system-ui" font-size="7">Elevation</text>
  <rect x="640" y="278" width="75" height="16" fill="#164e63" rx="3"/>
  <text x="677" y="289" text-anchor="middle" fill="#67e8f9" font-family="system-ui" font-size="7">SRTM 90m</text>
  <text x="640" y="310" text-anchor="middle" fill="#67e8f9" font-family="system-ui" font-size="9">⛰️ Altitude data • Free</text>

  <!-- Overpass -->
  <rect x="760" y="60" width="120" height="70" fill="url(#card)" stroke="#ec4899" stroke-width="2" rx="8"/>
  <text x="820" y="85" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="bold">Overpass API</text>
  <text x="820" y="100" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="8">POI Search</text>
  <text x="820" y="115" text-anchor="middle" fill="#f9a8d4" font-family="system-ui" font-size="8">🏥 🍽️ ⛽ 🏨 🏫</text>
  <line x1="560" y1="95" x2="760" y2="95" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Use cases -->
  <rect x="50" y="350" width="800" height="110" fill="url(#card)" stroke="#475569" stroke-width="1" rx="8"/>
  <text x="450" y="375" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="bold">Use Cases</text>

  <text x="80" y="400" fill="#6ee7b7" font-family="system-ui" font-size="10">🚕 Ride-Hailing</text>
  <text x="80" y="415" fill="#94a3b8" font-family="system-ui" font-size="8">geocode → get_route → distance_matrix</text>
  <text x="80" y="430" fill="#94a3b8" font-family="system-ui" font-size="8">ETA + fare calculation</text>

  <text x="300" y="400" fill="#fbbf24" font-family="system-ui" font-size="10">📦 Logistics</text>
  <text x="300" y="415" fill="#94a3b8" font-family="system-ui" font-size="8">distance_matrix → optimal route</text>
  <text x="300" y="430" fill="#94a3b8" font-family="system-ui" font-size="8">Multi-stop delivery planning</text>

  <text x="520" y="400" fill="#67e8f9" font-family="system-ui" font-size="10">🏠 Real Estate</text>
  <text x="520" y="415" fill="#94a3b8" font-family="system-ui" font-size="8">search_poi → walkability score</text>
  <text x="520" y="430" fill="#94a3b8" font-family="system-ui" font-size="8">Schools, hospitals, transit nearby</text>

  <text x="720" y="400" fill="#f9a8d4" font-family="system-ui" font-size="10">🌾 Agriculture</text>
  <text x="720" y="415" fill="#94a3b8" font-family="system-ui" font-size="8">get_elevation → terrain analysis</text>
  <text x="720" y="430" fill="#94a3b8" font-family="system-ui" font-size="8">Drainage and irrigation planning</text>
</svg>
